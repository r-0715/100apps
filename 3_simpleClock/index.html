<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時計</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
        <canvas id="canvas" width="200px" height="200px"></canvas>
    </div>
    <div id="display">
        <p id="display_hours" class="dis">00</p>
        <p id="mark">:</p>
        <p id="display_minutes" class="dis">00</p>
        <p id="display_seconds" class="dis">00</p>
    </div>
    <button id="test">試験用</button>
    <button id="stop">緊急停止ボタン</button>
    <script src="main.js"></script>
</body>
</html>
